# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Build documentation in the docs/ directory with Sphinx
sphinx:
    configuration: doc/conf.py

# Optionally build your docs in additional formats such as PDF and ePub
#   formats: all

# Optionally set the version of Python and requirements required to build your docs
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

build:
  tools:
    python: "3.12"
  os: ubuntu-lts-latest
  apt_packages:
    - openjdk-11-jdk
    - ant
  jobs:
    post_build:
      # Java API reference: Sphinx/autodoc only covers the Python side, so
      # the Java-facing reverse-bridge API (python.*, org.jpype) is built
      # separately with Javadoc and hosted as a static subtree alongside
      # the Sphinx site, linked from doc/api.rst. See plan/DOCS.md.
      - ant -f native/build.xml javadoc
      - mkdir -p $READTHEDOCS_OUTPUT/html/javadoc
      - cp -r native/build/javadoc/. $READTHEDOCS_OUTPUT/html/javadoc/
